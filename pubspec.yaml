name: round_timer
description: "Round Timer: Boxing, MMA, Judo — combat sports round timer."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.0
  wakelock_plus: ^1.2.0
  just_audio: ^0.10.5
  audio_session: ^0.2.2
  flutter_foreground_task: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/audio/bell.m4a
    - assets/audio/clapper.m4a
    - assets/audio/silence.m4a
  fonts:
    - family: BarlowCondensed
      fonts:
        - asset: assets/fonts/BarlowCondensed-Regular.ttf
        - asset: assets/fonts/BarlowCondensed-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/BarlowCondensed-ExtraBold.ttf
          weight: 800

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#0A0B0A"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
